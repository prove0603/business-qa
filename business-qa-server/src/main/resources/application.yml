server:
  port: 8091

spring:
  application:
    name: business-qa
  profiles:
    active: dev
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:postgresql://localhost:5432/business_qa
    username: postgres
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${AI_DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen3.5-plus
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v3
    mcp:
      client:
        enabled: true
        initialized: false
        name: business-qa-mcp-client
        version: 1.0.0
        type: SYNC
        request-timeout: 30s
        toolcallback:
          enabled: true
        streamable-http:
          connections:
            sentinel-ai:
              url: http://localhost:8090
              endpoint: /mcp

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

qa:
  resilience:
    retry:
      max-retries: 3
      initial-backoff: 2s
    rate-limiter:
      limit-for-period: 10
      limit-refresh-period: 60s
      timeout-duration: 5s
    circuit-breaker:
      failure-rate-threshold: 50
      wait-duration-in-open-state: 30s
      sliding-window-size: 10
      minimum-number-of-calls: 5
      permitted-in-half-open: 3
  rag:
    enabled: true
    embedding-model: text-embedding-v3
    chunk-size: 800
    chunk-min-size: 80
    chunk-overlap: 150
    top-k: 5
    similarity-threshold: 0.45
    rrf-k: 60
    memory-max-messages: 16
    memory-summarize-threshold: 24
  storage:
    endpoint: ${QA_STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${QA_STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${QA_STORAGE_SECRET_KEY:minioadmin}
    bucket: ${QA_STORAGE_BUCKET:business-qa}
    region: ${QA_STORAGE_REGION:us-east-1}
  git:
    clone-base-dir: ${user.home}/.business-qa/repos
    username: ${GIT_USERNAME:}
    password: ${GIT_PASSWORD:}

logging:
  level:
    com.zhuangjie.qa: DEBUG
    org.springframework.ai: DEBUG
