server:
  port: 8091

spring:
  application:
    name: business-qa
  profiles:
    active: dev
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:postgresql://localhost:5432/business_qa
    username: postgres
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${AI_DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
    mcp:
      client:
        enabled: true
        name: business-qa-mcp-client
        version: 1.0.0
        type: SYNC
        request-timeout: 30s
        toolcallback:
          enabled: true
        streamable-http:
          connections:
            sentinel-ai:
              url: http://localhost:8090
              endpoint: /mcp

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

qa:
  rag:
    enabled: true
    embedding-model: text-embedding-v3
  storage:
    endpoint: ${QA_STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${QA_STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${QA_STORAGE_SECRET_KEY:minioadmin}
    bucket: ${QA_STORAGE_BUCKET:business-qa}
    region: ${QA_STORAGE_REGION:us-east-1}
  git:
    clone-base-dir: ${user.home}/.business-qa/repos
    username: ${GIT_USERNAME:}
    password: ${GIT_PASSWORD:}

logging:
  level:
    com.zhuangjie.qa: DEBUG
    org.springframework.ai: DEBUG
